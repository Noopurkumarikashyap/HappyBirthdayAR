<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Sacramento&display=swap" rel="stylesheet">

</head>
<body>
    
<img src="images/deco_2.png" class="deco deco-top" alt="">
<img src="images/deco_1.png" class="deco deco-bottom" alt="">

<div class="sparkles">
    <span class="star s1"></span>
    <span class="star s2"></span>
    <span class="star s3"></span>
    <span class="star s4"></span>
    <span class="star s5"></span>
    <span class="star s6"></span>
    <span class="star s7"></span>
    <span class="star s8"></span>
    <span class="star s9"></span>
    <span class="star s10"></span>
    <span class="star s11"></span>
    <span class="star s12"></span>
</div>
    
    
<div class="container">

    <img src="images/lock.png" class="lock">

    <h1>Happy Birthday</h1>

    <div class="display">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="keypad">

    <button class="key" data-value="1">1</button>
    <button class="key" data-value="2">2</button>
    <button class="key" data-value="3">3</button>

    <button class="key" data-value="4">4</button>
    <button class="key" data-value="5">5</button>
    <button class="key" data-value="6">6</button>

    <button class="key" data-value="7">7</button>
    <button class="key" data-value="8">8</button>
    <button class="key" data-value="9">9</button>

    <button class="key" data-value="*">*</button>
    <button class="key" data-value="0">0</button>
    <button class="key" data-value="#">#</button>

</div>

<div class="actions">
    <button id="deleteBtn">⌫</button>
    <button id="nextBtn">NEXT</button>
</div>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
